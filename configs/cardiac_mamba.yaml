model: "cardiac_mamba"

data:
  name: "echonet"
  max_retries: 5

loss:
  name: "TemporalWeakSegLoss"
  dynamic_weighting: false
  weights:
    dice: 1.0
    volume: 1.0
    sv: 1.0
    phase: 1.0
    ef: 1.0
  focal:
    gamma: 2.0
    max_error: 300.0
    clip_threshold: 150.0
  distillation:
    enabled: false
    weight: 1.0
    temperature: 1.0
    alpha: 0.5
    student_dim: 256

training:
  epochs: 100
  batch_size: 4
  train_batch_size: 64
  val_batch_size: 64
  num_workers: 12
  persistent_workers: True
  lr: 1.1e-4
  weight_decay: 1.0e-5
  patience: 10
  seed: 42

  save_dir: "/workspace/runs"
  checkpoint_dir: "/workspace/checkpoints"
  test_metrics_csv: "/workspace/runs/mamba_metrics.csv"
  clinical_pairs_csv: "/workspace/runs/mamba_clinical_pairs.csv"
  resume_path: null

tta:
  enabled: false
